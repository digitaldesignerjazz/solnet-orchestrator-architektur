version: '3.8'

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solnet-orchestrator
    ports:
      - "8080:8080"   # REST + WebSocket API
    environment:
      - RUST_LOG=info
      - SOLNET_ENV=development
      # - SOLNET_YGGDRASIL_ADMIN=http://host.docker.internal:9001  # point to your Yggdrasil admin
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  # Future services (uncomment when ready)
